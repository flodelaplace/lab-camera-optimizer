# =============================================================
# Lab Camera Optimizer — DEMO (smallest working example)
# 8 x 5 m room, 6 wall cameras, one walking corridor with a
# priority analysis zone. Runs in well under a minute.
#
#   python preview_room.py --config configs/demo.yaml   # see the room
#   python optimize.py     --config configs/demo.yaml   # optimise
#
# Everything is in metres and degrees. Copy this file and edit it
# for your own lab.
# =============================================================

# 1. Room — just the outline corners (any polygon works)
room:
  corners: [[0, 0], [8, 0], [8, 5], [0, 5]]
  height: 3.0                     # floor-to-ceiling height

# 2. Obstacles — none here (pillars/furniture go here if needed)
obstacles: []

# 3. Subject — the person being recorded
subject:
  height: 1.9
  foot_z: 0.0

# 4. Cameras — one wall-mounted set
camera_sets:
  - id: "cam_A"
    name: "Wall camera"
    mounting: "wall"              # wall | tripod
    fov_h_landscape: 110.0        # field of view (landscape)
    fov_v_landscape:  70.0
    fov_h_portrait:   70.0        # field of view (portrait / rotated 90°)
    fov_v_portrait:  110.0
    max_range: 12.0
    min_range:  0.5
    height_options: [2.0, 2.2]    # mounting heights to try
    max_count:   6                # place up to 6 cameras
    min_spacing: 1.2
    score_weight: 1.0

# 5. Where coverage matters
capture_zones:
  # the walking path (lower priority = bonus coverage)
  - id: "corridor"
    type: "corridor"
    priority: 0.5
    length: 6.0
    width:  1.0
    placement:
      x_start_options: [1.0]      # one position → one combo (fast)
      y_options: [2.5]            # centre of the room

  # the part that really matters (higher priority)
  - id: "analysis_zone"
    type: "sub_zone"
    priority: 1.0
    length: 4.0
    contained_in: "corridor"
    offset_options: [1.0]         # starts 1 m after the corridor start

# 6. Optimisation
optimization:
  capture_mode: "markerless"      # markerless | markerbased
  target_coverage: 3              # aim for 3 cameras per point
  bilateral_weight: 0.8           # reward cameras on both sides of the path
  vertical_coverage_threshold: 0.9
  restarts_per_combo: 8           # more = better but slower
  wall_step: 0.5
  algo: "greedy_1opt"
  graph_mode: "best_per_combo"    # one figure per zone position
